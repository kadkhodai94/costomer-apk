name: Build Flutter APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-apk:
    name: Extract ZIP and Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # فایل ZIP پروژه را با همین نام داخل ریشه ریپو بگذار
      ZIP_NAME: customer_account_flutter_project.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find ZIP file
        id: find_zip
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$ZIP_NAME" ]; then
            ZIP_PATH="$ZIP_NAME"
          else
            ZIP_PATH="$(find . -maxdepth 3 -type f -name '*.zip' | head -n 1 || true)"
          fi

          if [ -z "$ZIP_PATH" ]; then
            echo "ERROR: No ZIP file found."
            echo "Put your Flutter ZIP file in the repository root."
            exit 1
          fi

          echo "ZIP found: $ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Extract ZIP
        shell: bash
        run: |
          set -euo pipefail

          rm -rf extracted_project
          mkdir -p extracted_project

          unzip -q "${{ steps.find_zip.outputs.zip_path }}" -d extracted_project

          echo "Extracted files:"
          find extracted_project -maxdepth 3 -type f | head -n 80

      - name: Detect Flutter project folder
        id: project
        shell: bash
        run: |
          set -euo pipefail

          PUBSPEC_PATH="$(find extracted_project -maxdepth 6 -type f -name 'pubspec.yaml' | head -n 1 || true)"

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "ERROR: pubspec.yaml not found inside ZIP."
            echo "Make sure your ZIP contains a Flutter project."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PUBSPEC_PATH")"

          echo "Flutter project found at: $PROJECT_DIR"
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        shell: bash
        run: flutter --version

      - name: Prepare Flutter project
        shell: bash
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          set -euo pipefail

          if [ ! -d "android" ]; then
            echo "Android folder not found. Creating Android platform files..."
            flutter create --platforms=android .
          else
            echo "Android folder exists."
          fi

          rm -f pubspec.lock

          echo "Current pubspec.yaml:"
          cat pubspec.yaml

      - name: Get dependencies
        shell: bash
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          set -euo pipefail
          flutter pub get

      - name: Build release APK
        shell: bash
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          set -euo pipefail
          flutter build apk --release --no-tree-shake-icons

      - name: Collect APK
        shell: bash
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          set -euo pipefail

          mkdir -p release-output

          APK_PATH="$(find build/app/outputs/flutter-apk -type f -name '*release*.apk' | head -n 1 || true)"

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: Release APK not found."
            find build -type f -name '*.apk' -print || true
            exit 1
          fi

          cp "$APK_PATH" release-output/customer-account-release.apk

          echo "APK ready:"
          ls -lh release-output/customer-account-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-account-release-apk
          path: ${{ steps.project.outputs.dir }}/release-output/customer-account-release.apk
          if-no-files-found: error
          retention-days: 30
